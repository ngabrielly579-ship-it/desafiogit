<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Ford</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <img src="imagens/logo-ford-256.png" alt="Logo Ford" class="logo">

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="lancamento.html">Lançamento</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

</header>

<main class="pagina-contato">

    <div class="contato-container">

        <div class="imagem-contato">
            <img src="imagens/storm.jpg" alt="Ford Ranger">
        </div>

        <form>

            <h3>Sobre Você</h3>

            <input type="text" placeholder="NOME*" required>

            <input type="email" placeholder="E-MAIL*" required>

            <input type="text" placeholder="CPF*" required>

            <input type="text" placeholder="SOBRENOME*" required>

            <input type="tel" placeholder="TELEFONE*" required>

            <select required>
                <option>COMO DESEJA SER CONTATADO</option>
                <option>E-mail</option>
                <option>Telefone</option>
                <option>WhatsApp</option>
            </select>

            <button type="submit">Enviar</button>

        </form>

    </div>

</main>

<footer>

    <div class="redes">
        <span>Redes Sociais</span>

        <img src="imagens/facebook-50.png" alt="Facebook">

        <img src="imagens/youtube-squared-50.png" alt="YouTube">

        <img src="imagens/instagram-logo-50.png" alt="Instagram">
    </div>

    <img src="imagens/ford-96.png" alt="Ford" class="logo-footer">

</footer>

</body>

</html>
