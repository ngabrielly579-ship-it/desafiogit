<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lançamento Ford Ranger</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <img
            src="imagens/logo-ford-256.png"
            alt="Logo Ford"
            class="logo"
        >

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="lancamento.html">Lançamento</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="pagina-lancamento">

        <section class="video-container">
            <iframe
                src="https://www.youtube.com/embed/vQsryuNmsL0"
                title="Vídeo promocional da Ford Ranger"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </section>

        <section class="modelos">

            <article class="modelo">
                <img
                    src="imagens/storm.jpg"
                    alt="Ford Ranger Storm"
                >

                <div class="modelo-info">
                    <input
                        type="checkbox"
                        id="storm"
                        name="modelo"
                        checked
                    >

                    <label for="storm">
                        <strong>Ranger Storm 3.2 Diesel</strong>
                        <span>Modelo robusto e potente.</span>
                    </label>
                </div>
            </article>

            <article class="modelo">
                <img
                    src="imagens/XL Cabine.jpg"
                    alt="Ford Ranger XL Cabine"
                >

                <div class="modelo-info">
                    <input
                        type="checkbox"
                        id="xl-cabine"
                        name="modelo"
                    >

                    <label for="xl-cabine">
                        <strong>Ranger XL Cabine</strong>
                        <span>Desempenho e versatilidade.</span>
                    </label>
                </div>
            </article>

            <article class="modelo">
                <img
                    src="imagens/xls 2.2 diesel.jpg"
                    alt="Ford Ranger XLS Diesel"
                >

                <div class="modelo-info">
                    <input
                        type="checkbox"
                        id="xls"
                        name="modelo"
                    >

                    <label for="xls">
                        <strong>Ranger XLS 2.2 Diesel</strong>
                        <span>Conforto e tecnologia.</span>
                    </label>
                </div>
            </article>

        </section>

        <button type="button" class="botao-comparar">
            Comparar Carros
        </button>

    </main>

    <footer>
        <div class="redes">
            <span>Redes Sociais</span>

            <img
                src="imagens/facebook-50.png"
                alt="Facebook"
            >

            <img
                src="imagens/youtube-squared-50.png"
                alt="YouTube"
            >

            <img
                src="imagens/instagram-logo-50.png"
                alt="Instagram"
            >
        </div>

        <img
            src="imagens/ford-96.png"
            alt="Logo Ford"
            class="logo-footer"
        >
    </footer>

</body>

</html>
